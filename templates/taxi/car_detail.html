{% extends "base.html" %}

{% block content %}
  <p>Manufacturer: ({{ car.manufacturer.name }}, {{ car.manufacturer.country }})</p>
  <h1>Drivers</h1>
  <hr>
  <a href="{% url 'taxi:car-update' object.pk %}" class="btn btn-warning">
    Update
  </a>

  <a href="{% url 'taxi:car-delete' object.pk %}" class="btn btn-danger">
    Delete
  </a>
  <ul>
    {% for driver in car.drivers.all %}
      <li>{{ driver.username }} ({{ driver.first_name }} {{ driver.last_name }})</li>
    {% endfor %}
  </ul>
{% endblock %}
